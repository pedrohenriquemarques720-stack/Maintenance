<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Manutenção - Painel Diário</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: var(--primary);
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: center;
            background: var(--secondary);
            padding: 10px;
        }

        nav button {
            background: none;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        nav button:hover {
            background: var(--accent);
            border-radius: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        .tab-content { display: none; }
        .active { display: block; }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        input, select, button.add-btn {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button.add-btn {
            background-color: var(--success);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th { background-color: var(--light); }

        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .pending { background: var(--warning); color: #000; }
        .done { background: var(--success); color: #fff; }

        .btn-finish {
            background: var(--accent);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .history-row { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<header>
    <h1>Controle de Manutenção de Fábrica</h1>
</header>

<nav>
    <button onclick="showTab('execucao')">Atendimento Atual</button>
    <button onclick="showTab('planejamento')">Máquinas a Planejar</button>
    <button onclick="showTab('historico')">Histórico Diário</button>
</nav>

<div class="container">
    
    <div id="execucao" class="tab-content active">
        <h3>Lançar Atendimento</h3>
        <div class="form-group">
            <input type="text" id="exec-maquina" placeholder="Nome da Máquina">
            <input type="text" id="exec-falha" placeholder="Descrição da Falha">
            <select id="exec-tecnico">
                <option value="">Selecione o Manutentor</option>
                <option>Lucas</option><option>Carlos Eduardo</option><option>Santana</option>
                <option>Chico</option><option>Tadeu</option><option>Picolli</option>
                <option>Kleber</option><option>Daniel</option><option>Cleber</option>
                <option>Robson</option><option>Michael</option><option>Alisson</option>
            </select>
            <button class="add-btn" onclick="adicionarAtendimento()">Iniciar Trabalho</button>
        </div>

        <table id="tabela-execucao">
            <thead>
                <tr>
                    <th>Máquina</th>
                    <th>Falha</th>
                    <th>Manutentor</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="planejamento" class="tab-content">
        <h3>Planejamento de Intervenções</h3>
        <div class="form-group">
            <input type="text" id="plan-maquina" placeholder="Máquina">
            <input type="text" id="plan-falha" placeholder="O que precisa ser feito?">
            <button class="add-btn" onclick="adicionarPlanejamento()">Adicionar à Fila</button>
        </div>
        <table id="tabela-planejamento">
            <thead>
                <tr>
                    <th>Máquina</th>
                    <th>Observação/Falha</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="historico" class="tab-content">
        <h3>Histórico de Trabalhos Finalizados</h3>
        <table id="tabela-historico">
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Máquina</th>
                    <th>Manutentor</th>
                    <th>Falha Resolvida</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="limparHistorico()" style="margin-top:20px; background:var(--danger); color:white; border:none; padding:10px; cursor:pointer;">Limpar Histórico</button>
    </div>

</div>

<script>
    // Banco de dados em LocalStorage
    let atendimentos = JSON.parse(localStorage.getItem('atendimentos')) || [];
    let planejamento = JSON.parse(localStorage.getItem('planejamento')) || [];
    let historico = JSON.parse(localStorage.getItem('historico')) || [];

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        renderizar();
    }

    function adicionarAtendimento() {
        const maq = document.getElementById('exec-maquina').value;
        const falha = document.getElementById('exec-falha').value;
        const tec = document.getElementById('exec-tecnico').value;

        if(!maq || !tec) return alert("Preencha máquina e técnico!");

        atendimentos.push({ id: Date.now(), maq, falha, tec, status: 'Pendente' });
        limparCamposExec();
        salvar();
    }

    function adicionarPlanejamento() {
        const maq = document.getElementById('plan-maquina').value;
        const falha = document.getElementById('plan-falha').value;
        if(!maq) return;

        planejamento.push({ id: Date.now(), maq, falha });
        document.getElementById('plan-maquina').value = '';
        document.getElementById('plan-falha').value = '';
        salvar();
    }

    function finalizar(id) {
        const index = atendimentos.findIndex(a => a.id === id);
        const item = atendimentos.splice(index, 1)[0];
        
        const agora = new Date().toLocaleString('pt-BR');
        historico.unshift({ ...item, dataFim: agora });
        salvar();
    }

    function removerPlan(id) {
        planejamento = planejamento.filter(p => p.id !== id);
        salvar();
    }

    function salvar() {
        localStorage.setItem('atendimentos', JSON.stringify(atendimentos));
        localStorage.setItem('planejamento', JSON.stringify(planejamento));
        localStorage.setItem('historico', JSON.stringify(historico));
        renderizar();
    }

    function limparCamposExec() {
        document.getElementById('exec-maquina').value = '';
        document.getElementById('exec-falha').value = '';
        document.getElementById('exec-tecnico').value = '';
    }

    function limparHistorico() {
        if(confirm("Deseja apagar todo o histórico?")) {
            historico = [];
            salvar();
        }
    }

    function renderizar() {
        // Render Execução
        const tbodyExec = document.querySelector('#tabela-execucao tbody');
        tbodyExec.innerHTML = atendimentos.map(a => `
            <tr>
                <td>${a.maq}</td>
                <td>${a.falha}</td>
                <td><b>${a.tec}</b></td>
                <td><span class="status-badge pending">Em Andamento</span></td>
                <td><button class="btn-finish" onclick="finalizar(${a.id})">Finalizar</button></td>
            </tr>
        `).join('');

        // Render Planejamento
        const tbodyPlan = document.querySelector('#tabela-planejamento tbody');
        tbodyPlan.innerHTML = planejamento.map(p => `
            <tr>
                <td>${p.maq}</td>
                <td>${p.falha}</td>
                <td><button onclick="removerPlan(${p.id})" style="color:red; background:none; border:none; cursor:pointer;">Excluir</button></td>
            </tr>
        `).join('');

        // Render Histórico
        const tbodyHist = document.querySelector('#tabela-historico tbody');
        tbodyHist.innerHTML = historico.map(h => `
            <tr class="history-row">
                <td>${h.dataFim}</td>
                <td>${h.maq}</td>
                <td>${h.tec}</td>
                <td>${h.falha}</td>
            </tr>
        `).join('');
    }

    // Inicialização
    renderizar();
</script>

</body>
</html>
